---
# Codacy analysis configuration.
# Docs: https://docs.codacy.com/repositories-configure/codacy-configuration-file/

exclude_paths:
  # Dependency trees — not our code, would inflate duplication + complexity.
  - "node_modules/**"
  - "packages/**/node_modules/**"

  # Generated benchmark reports — markdown artifacts, not source.
  - "reports/**"

  # Query fixtures — JSON input data for the harness, not source code.
  - "packages/harness/queries/**"

  # Build output.
  - "dist/**"
  - "packages/**/dist/**"

  # .mcpb distribution shim. Its one intentional dynamic import() — of a
  # content-hashed temp file we wrote ourselves from local shards (SHA-169) —
  # trips Codacy's "unsafe import" heuristic with no external input involved.
  - "packages/server/mcpb-loader.mjs"

  # Coverage artefacts.
  - "coverage/**"
  - "packages/**/coverage/**"

---
# Codacy analysis configuration.
# Docs: https://docs.codacy.com/repositories-configure/codacy-configuration-file/

exclude_paths:
  # Dependency trees — not our code, would inflate duplication + complexity.
  - "node_modules/**"
  - "packages/**/node_modules/**"

  # Generated benchmark reports — markdown artifacts, not source.
  - "reports/**"

  # Dev-only measurement harness — never published to npm (only `seekstone` /
  # `@seekstone/core` ship). Codacy's grade/security signal is more meaningful
  # focused on the shipped code, and the harness recurringly trips false
  # positives: an SSRF flag on the checksum-verified, pinned-URL corpus fetcher,
  # and noUncheckedIndexedAccess patterns our tsconfig already guards. Biome +
  # tsc + vitest (incl. a Windows matrix) still cover the harness in CI.
  - "packages/harness/**"

  # Build output.
  - "dist/**"
  - "packages/**/dist/**"

  # .mcpb distribution shim. Its one intentional dynamic import() — of a
  # content-hashed temp file we wrote ourselves from local shards (SHA-169) —
  # trips Codacy's "unsafe import" heuristic with no external input involved.
  - "packages/server/mcpb-loader.mjs"

  # Coverage artefacts.
  - "coverage/**"
  - "packages/**/coverage/**"

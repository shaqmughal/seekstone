name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build -w seekstone

      - name: Typecheck
        run: |
          npx tsc -p packages/core/tsconfig.json --noEmit
          npx tsc -p packages/harness/tsconfig.json --noEmit
          npx tsc -p packages/server/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      # Gate: MCP protocol conformance — boots the built server over stdio with
      # the SDK reference client and asserts handshake, exact tool surface
      # (HANDLED_TOOLS), and a search + append_note round-trip. Protocol
      # behavior is OS-independent; run once (Linux). Filesystem behavior is
      # covered by the OS-matrix unit tests.
      - name: MCP protocol conformance
        if: matrix.os == 'ubuntu-latest'
        run: npm run conformance

      # Guard: server.json (the MCP registry manifest) must match the package
      # versions. A manual `mcp-publisher publish` reads this file as-is, so a
      # stale version here would regress the registry. Runs once (Linux).
      - name: server.json version sync
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/sync-server-json.mjs --check

      # Guard: docs/REGISTRIES.md is the canonical copy pasted into every registry
      # listing — its tool count/list must match the server's HANDLED_TOOLS, or
      # stale numbers (e.g. "8 tools") propagate to every directory. Runs once (Linux).
      - name: REGISTRIES.md tool list sync
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/check-registries-tools.mjs

      # Coverage gate runs once (Linux) — thresholds live in the server's
      # vitest config and fail the build if logic coverage regresses.
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        env:
          SEEKSTONE_COVERAGE: '1'
        run: npx vitest run --coverage --root packages/server

      # Harness coverage gate — thresholds live in the harness vitest config and
      # fail the build if the measurement core / fixture primitives regress. The
      # process- and network-driving adapters are excluded there (validated by
      # running the real harness, not unit coverage). Runs once (Linux).
      - name: Coverage gate (harness)
        if: matrix.os == 'ubuntu-latest'
        run: npx vitest run --coverage --root packages/harness

      # Core coverage gate — thresholds live in the core vitest config. Core
      # holds the safety-critical shared primitives (frontmatter round-trip,
      # link extraction, outline), so a regression there fails the build too.
      # Runs once (Linux).
      - name: Coverage gate (core)
        if: matrix.os == 'ubuntu-latest'
        run: npx vitest run --coverage --root packages/core

      # Coverage upload is a reporting side-effect, not a correctness gate.
      # Skip it for Dependabot PRs: GitHub withholds repo secrets from
      # Dependabot-triggered runs, so the token is empty and the step fails.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/server/coverage/lcov.info,packages/harness/coverage/lcov.info,packages/core/coverage/lcov.info
          flags: server
          fail_ci_if_error: false

      - name: Upload coverage to Codacy
        if: matrix.os == 'ubuntu-latest' && github.actor != 'dependabot[bot]'
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: packages/server/coverage/lcov.info

  changeset:
    name: changeset check
    runs-on: ubuntu-latest
    # Only meaningful on PRs; skip the automated "Version Packages" branch.
    if: |
      github.event_name == 'pull_request' &&
      github.head_ref != 'changeset-release/main'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Require changeset for publishable package changes
        env:
          BASE: ${{ github.base_ref }}
        run: |
          # Which publishable packages did this PR touch?
          # Only src/ and package.json count — config, test, and manifest files
          # don't affect what's published to npm and don't need a changeset.
          PACKAGES_CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" \
            | grep -E '^packages/server/(src/|package\.json$)' \
            | grep -v '\.test\.ts$' \
            | wc -l | tr -d ' ')

          if [ "$PACKAGES_CHANGED" -eq 0 ]; then
            echo "No publishable package files changed — no changeset required."
            exit 0
          fi

          # Did this PR add a changeset file?
          CHANGESET_ADDED=$(git diff --name-only --diff-filter=A "origin/${BASE}...HEAD" \
            | grep -E '^\.changeset/.+\.md$' \
            | grep -v 'README' \
            | wc -l | tr -d ' ')

          if [ "$CHANGESET_ADDED" -eq 0 ]; then
            echo "❌ This PR modifies a publishable package but contains no changeset."
            echo "   Run 'npx changeset' and commit the generated file."
            exit 1
          fi

          echo "✅ Changeset found."

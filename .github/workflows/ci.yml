name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build server
        run: npm run build -w seekstone

      - name: Typecheck
        run: |
          npx tsc -p packages/core/tsconfig.json --noEmit
          npx tsc -p packages/harness/tsconfig.json --noEmit
          npx tsc -p packages/server/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      # Coverage gate runs once (Linux) — thresholds live in the server's
      # vitest config and fail the build if logic coverage regresses.
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        env:
          SEEKSTONE_COVERAGE: '1'
        run: npx vitest run --coverage --root packages/server

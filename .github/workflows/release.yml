name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two releases at once.
concurrency: release-${{ github.ref }}

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets opens the version PR and pushes tags
      pull-requests: write # changesets opens the version PR
      id-token: write # npm provenance + sigstore signing
      attestations: write # write the MCPB build-provenance attestation
    defaults:
      run:
        shell: bash
    steps:
      # Mint a short-lived GitHub App installation token for the release bot.
      # This replaces the old GH_PAT: an App token never expires from under us
      # (it's re-minted each run and auto-expires in ~1h) and, crucially, pushes
      # made with it DO trigger workflows — unlike the default GITHUB_TOKEN, whose
      # github-actions[bot] pushes GitHub blocks pull_request CI on (loop
      # prevention). Requires repo secrets APP_ID + APP_PRIVATE_KEY from a GitHub
      # App (Contents: R/W, Pull requests: R/W) installed on this repo.
      - name: Mint release-bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Persist the App token (not the default GITHUB_TOKEN) as the git
          # credential so the "Version Packages" branch is PUSHED as the App bot.
          # changesets/action opens the PR via the API token in the step below, but
          # it pushes the branch commits using checkout's persisted credentials —
          # with the default token that push is github-actions[bot] and GitHub blocks
          # pull_request CI on it, leaving the release PR permanently BLOCKED on the
          # required test checks. Pushing with the App token makes CI fire normally.
          token: ${{ steps.app-token.outputs.token }}

      # NOTE: no `registry-url` here on purpose. setup-node's registry-url
      # writes an ~/.npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`;
      # with no token that line is empty and shadows OIDC (configured auth wins),
      # causing an unauthenticated publish → E404. Omitting it lets npm's
      # automatic OIDC trusted publishing handle auth against the default registry.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build -w seekstone

      # Publish gates — a bad build/test/smoke must block the release.
      - name: Typecheck
        run: |
          npx tsc -p packages/core/tsconfig.json --noEmit
          npx tsc -p packages/harness/tsconfig.json --noEmit
          npx tsc -p packages/server/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Smoke-test the published tarball
        run: npm run smoke

      # On a push that still has changesets pending → opens/updates a "Version
      # Packages" PR. On the push that merges that PR (no changesets left) →
      # publishes to npm with provenance. Re-publishing an existing version is
      # a no-op, so this is safe to re-run.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: npm run version-packages
          publish: npm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # The App token is the API token changesets uses to open the "Version
          # Packages" PR, so its author is the App bot rather than github-actions[bot].
          # This pairs with the same token on the checkout step above: authoring the PR
          # via the App is not enough on its own — the branch must also be PUSHED with it
          # (see that comment) for the required pull_request CI to fire.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Build MCP Bundle
        if: steps.changesets.outputs.published == 'true'
        run: npm run build:mcpb

      # Keyless (OIDC → Fulcio → Rekor) SLSA build-provenance attestation for the
      # exact bytes of the shipped bundle. Verifiable with `gh attestation verify`.
      - name: Attest build provenance for MCPB
        id: attest
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: seekstone.mcpb

      - name: Attach MCPB + provenance to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/server/package.json').version")
          # Upload the attestation under a Scorecard-recognized extension so the
          # Signed-Releases check detects it as a release signature asset.
          cp "${{ steps.attest.outputs.bundle-path }}" seekstone.mcpb.intoto.jsonl
          gh release upload "seekstone@${VERSION}" \
            seekstone.mcpb seekstone.mcpb.intoto.jsonl --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # `seekstone` and `obsidian-mcp-seekstone` are linked in changesets, so the
      # action cuts a GitHub Release for BOTH tags every version. The alias is a
      # pure npm-discoverability redirect (its only dep is `seekstone`), and the
      # install bundle is a signed/attested artifact that should have ONE canonical
      # home — `seekstone@X`. So we delete the redundant alias Release here, keeping
      # the git tag (no --cleanup-tag) for provenance and leaving the npm package
      # untouched. Idempotent: re-runs where it's already gone are a no-op.
      - name: Remove redundant alias GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/obsidian-mcp-seekstone/package.json').version")
          if gh release view "obsidian-mcp-seekstone@${VERSION}" >/dev/null 2>&1; then
            gh release delete "obsidian-mcp-seekstone@${VERSION}" --yes
          else
            echo "No obsidian-mcp-seekstone@${VERSION} release to delete; skipping."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Belt-and-suspenders: server.json is normally kept current by
      # `version-packages` (see scripts/sync-server-json.mjs), but re-sync here
      # in case this publish runs without a fresh version bump (e.g. manual
      # workflow_dispatch). Same script the version step and CI guard use.
      - name: Sync server.json version
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: node scripts/sync-server-json.mjs

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      # NOTE: a manual Glama release step is still required after every publish.
      # Glama has no public API for programmatic release creation (investigated SHA-85).
      # See docs/RELEASING.md for the manual steps and the placeholder curl command
      # to drop in here once Glama exposes an API or webhook.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two releases at once.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets opens the version PR and pushes tags
  pull-requests: write # changesets opens the version PR
  id-token: write # npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # NOTE: no `registry-url` here on purpose. setup-node's registry-url
      # writes an ~/.npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`;
      # with no token that line is empty and shadows OIDC (configured auth wins),
      # causing an unauthenticated publish → E404. Omitting it lets npm's
      # automatic OIDC trusted publishing handle auth against the default registry.
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Build server
        run: npm run build -w seekstone

      # Publish gates — a bad build/test/smoke must block the release.
      - name: Typecheck
        run: |
          npx tsc -p packages/core/tsconfig.json --noEmit
          npx tsc -p packages/harness/tsconfig.json --noEmit
          npx tsc -p packages/server/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Smoke-test the published tarball
        run: npm run smoke

      # On a push that still has changesets pending → opens/updates a "Version
      # Packages" PR. On the push that merges that PR (no changesets left) →
      # publishes to npm with provenance. Re-publishing an existing version is
      # a no-op, so this is safe to re-run.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # GH_PAT (fine-grained PAT, Contents+PRs read/write) is required here
          # instead of GITHUB_TOKEN. PRs opened with GITHUB_TOKEN are created by
          # github-actions[bot] and GitHub intentionally blocks pull_request CI
          # events on them to prevent recursive workflow loops. A PAT makes the PR
          # look like it came from a real user, so CI fires normally.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Build MCP Bundle
        if: steps.changesets.outputs.published == 'true'
        run: npm run build:mcpb

      - name: Attach MCPB to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/server/package.json').version")
          gh release upload "seekstone@${VERSION}" seekstone.mcpb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        if: steps.changesets.outputs.published == 'true'
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/server/package.json').version")
          OMCP_VERSION=$(node -p "require('./packages/obsidian-mcp-seekstone/package.json').version")
          jq --arg v "$VERSION" --arg ov "$OMCP_VERSION" \
            '.version = $v | .packages[] |= if .identifier == "seekstone" then .version = $v elif .identifier == "obsidian-mcp-seekstone" then .version = $ov else . end' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: ./mcp-publisher publish

      # NOTE: a manual Glama release step is still required after every publish.
      # Glama has no public API for programmatic release creation (investigated SHA-85).
      # See RELEASING.md for the manual steps and the placeholder curl command to
      # drop in here once Glama exposes an API or webhook.
